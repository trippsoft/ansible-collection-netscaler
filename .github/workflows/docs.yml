---
name: Generate Role Docs
'on':
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths:
      - galaxy.yml
      - roles/server_certificate/.aar_doc.yml
      - roles/server_certificate/README.md
      - roles/server_certificate/meta/argument_specs.yml
      - roles/server_certificate/meta/main.yml
defaults:
  run:
    working-directory: 'trippsc2.netscaler'
jobs:
  docs_server_certificate:
    name: Generate server_certificate role documentation
    permissions:
      contents: write
    runs-on:
      - self-hosted
      - linux
      - ansible
      - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: trippsc2.netscaler
          ref: main
      - name: Generate server_certificate role documentation
        working-directory: 'trippsc2.netscaler'
        run: |
          source ~/venv/ansible-2.16/bin/activate
          cd ./roles/server_certificate
          aar-doc . markdown
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add README.md || /bin/true
          git commit -m "Update server_certificate role documentation." || /bin/true
          git push origin main
          deactivate
